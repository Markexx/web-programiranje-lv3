<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Filmska Arhiva - Baza podataka s mogućnošću filtriranja i košaricom.">
    <title>Filmska Arhiva | Početna</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

    <header>
        <h1>Filmska Arhiva 2024/2025</h1>
    </header>

    <nav aria-label="Glavna navigacija">
        <ul class="nav-links">
            <li><a href="index.html">Početna</a></li>
            <li class="dropdown">
                <button class="dropbtn">Pregled ▾</button>
                <ul class="dropdown-content">
                    <li><a href="grafikon.html">Grafički prikaz</a></li>
                    <li><a href="slike.html">Galerija slika</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <main class="main-grid">
        
        <section class="table-container">
            <h2>Popis filmova</h2>
            
            <div id="filteri">
                <select id="filter-genre">
                    <option value="">Svi žanrovi</option>
                    <option value="Drama">Drama</option>
                    <option value="Action">Action</option>
                    <option value="Crime">Crime</option>
                    <option value="Comedy">Comedy</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="War">War</option>
                    <option value="Horror">Horror</option>
                    <option value="Animation">Animation</option>
                </select>

                <input type="number" id="filter-year" placeholder="Godina od">

                <input type="range" id="filter-rating" min="0" max="10" step="0.1" value="0">
                <span id="rating-value">0</span>

                <button id="filter-btn">Filtriraj</button>
            </div>

            <div class="scroll-wrapper">
                <table id="filmovi-tablica">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Naslov</th>
                            <th>Godina</th>
                            <th>Žanr</th>
                            <th>Trajanje</th>
                            <th>Država</th>
                            <th>Ocjena</th>
                            <th>Akcija</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </section>

        <aside>
            <section id="kosarica">
                <h2>Košarica</h2>
                <ul id="kosarica-lista"></ul>
                <button id="potvrdi-kosaricu">Potvrdi posudbu</button>
            </section>
        </aside>

    </main>

    <footer>
        <p>&copy; 2026. Web Programiranje. Sva prava pridržana.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
