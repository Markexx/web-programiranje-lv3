<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vizualizacija filmskih žanrova pomoću CSS-only grafikona.">
    <title>Filmska Arhiva | Grafikon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style_grafikon.css">
</head>
<body>

    <header>
    <h1>Filmska Arhiva 2024/2025</h1>
    </header>

    <nav aria-label="Glavni izbornik">
        <ul class="nav-links">
            <li><a href="index.html">Početna</a></li>
            <li class="dropdown">
                <button class="dropbtn">Pregled ▾</button>
                <ul class="dropdown-content">
                    <li><a href="grafikon.html">Grafički prikaz</a></li>
                    <li><a href="slike.html">Galerija slika</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <main class="chart-main">
        <section class="chart-container">
            <h2>Statistika žanrova i ocjena</h2>
            <p>Prikaz distribucije filmova prema žanrovima (Komedija vs Drama vs Ostalo).</p>

            <div class="pie-wrapper">
                <div class="pie-chart" aria-label="Kružni grafikon udjela filmskih žanrova"></div>
                <ul class="chart-legend">
                    <li><span class="dot comedy"></span> Komedija (40%)</li>
                    <li><span class="dot drama"></span> Drama (35%)</li>
                    <li><span class="dot other"></span> Ostalo (25%)</li>
                </ul>
            </div>

            <div class="histogram-wrapper">
                <div class="bar" style="--h: 40%; --color: var(--comedy-color);" data-info="Komedija: 40%" data-label="Kom."></div>
                <div class="bar" style="--h: 35%; --color: var(--drama-color);" data-info="Drama: 35%" data-label="Dra."></div>
                <div class="bar" style="--h: 25%; --color: var(--other-color);" data-info="Ostalo: 25%" data-label="Ost."></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026. Web Programiranje. Sva prava pridržana.</p>
    </footer>

</body>
</html>
